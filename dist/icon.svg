  <circle cx="256" cy="360" r="35" fill="none" stroke="#d4a574" stroke-width="2"/>
  
  <!-- 琴颈 -->
  <rect x="238" y="80" width="36" height="190" fill="#8b4513" rx="3"/>
  
  <!-- 品丝 -->
  <line x1="240" y1="120" x2="272" y2="120" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="240" y1="155" x2="272" y2="155" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="240" y1="190" x2="272" y2="190" stroke="#c0c0c0" stroke-width="2"/>
  <line x1="240" y1="225" x2="272" y2="225" stroke="#c0c0c0" stroke-width="2"/>
  
  <!-- 琴头 -->
  <path d="M238 80 L238 55 Q238 45 248 45 L264 45 Q274 45 274 55 L274 80 Z" fill="#8b4513"/>
  
