  <circle cx="245" cy="60" r="6" fill="#d4a574" stroke="#b8860b" stroke-width="1"/>
  <circle cx="267" cy="60" r="6" fill="#d4a574" stroke="#b8860b" stroke-width="1"/>
  <circle cx="245" cy="72" r="6" fill="#d4a574" stroke="#b8860b" stroke-width="1"/>
  <circle cx="267" cy="72" r="6" fill="#d4a574" stroke="#b8860b" stroke-width="1"/>
  
  <!-- 琴桥 -->
  <rect x="220" y="420" width="72" height="15" fill="#8b4513" rx="3"/>
  
  <!-- 琴弦 -->
  <line x1="246" y1="85" x2="246" y2="420" stroke="#f5f5dc" stroke-width="1.5"/>
  <line x1="256" y1="85" x2="256" y2="420" stroke="#f5f5dc" stroke-width="1.5"/>
  <line x1="266" y1="85" x2="266" y2="420" stroke="#f5f5dc" stroke-width="1.5"/>
  
  <!-- 装饰音符 -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="400" cy="150" r="15"/>
    <rect x="412" y="110" width="5" height="45" rx="2"/>
    <path d="M417 110 Q430 105 425 120 Q420 130 417 125" fill="rgba(255,255,255,0.4)"/>
    
    <circle cx="100" cy="300" r="18"/>
